<meta charset="UTF-8">

<title>Deutsch Quest 2 · Aprende alemán</title>
<style>
  :root{

    --gold:#ffce3a;--red:#e4574c;--green:#34c98b;--blue:#5b8cff;--purple:#a06bff;--line:#2e3158;
    --shadow:0 10px 30px rgba(0,0,0,.35);
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:
    radial-gradient(1200px 600px at 80% -10%,#26285033,transparent),
    radial-gradient(900px 500px at -10% 110%,#3a1d4a33,transparent),var(--bg);color:var(--ink);min-height:100vh}
  header{padding:16px 20px;display:flex;align-items:center;gap:14px;border-bottom:1px solid var(--line);
    position:sticky;top:0;background:rgba(15,16,32,.9);backdrop-filter:blur(8px);z-index:20;flex-wrap:wrap}
  .flag{display:inline-block;width:32px;height:21px;border-radius:4px;box-shadow:var(--shadow);
    background:linear-gradient(#1a1a1a 0 33%,var(--red) 33% 66%,var(--gold) 66% 100%)}
  .logo{font-weight:800;font-size:21px}
  .stats{margin-left:auto;display:flex;gap:8px;flex-wrap:wrap}
  .chip{background:var(--panel);border:1px solid var(--line);border-radius:999px;padding:6px 12px;font-size:13px;
    display:flex;align-items:center;gap:6px;white-space:nowrap}
  .chip b{color:var(--gold)}
  .bar{height:8px;background:var(--panel2);border-radius:999px;overflow:hidden;min-width:110px;flex:1}
  .bar>i{display:block;height:100%;background:linear-gradient(90deg,var(--blue),var(--green));width:0%}
  nav{display:flex;gap:6px;padding:10px 20px;flex-wrap:wrap;border-bottom:1px solid var(--line)}
  nav button{background:transparent;border:1px solid transparent;color:var(--muted);padding:9px 14px;border-radius:10px;
    cursor:pointer;font-size:14px;font-weight:600}
  nav button.active{background:var(--panel);color:var(--ink);border-color:var(--line)}
  main{max-width:760px;margin:0 auto;padding:22px 16px 90px}
  h2{margin:6px 0 14px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:16px;box-shadow:var(--shadow)}
  .mode{cursor:pointer;transition:transform .12s,border-color .12s}
  .mode:hover{transform:translateY(-3px);border-color:var(--blue)}
  .mode .emoji{font-size:30px}.mode h3{margin:8px 0 4px;font-size:17px}.mode p{margin:0;color:var(--muted);font-size:13px}
  .mode .meta{margin-top:10px;font-size:12px;color:var(--muted);display:flex;justify-content:space-between}
  .btn{background:linear-gradient(90deg,var(--blue),#7a6bff);color:#fff;border:none;padding:12px 18px;border-radius:12px;
    font-size:15px;font-weight:700;cursor:pointer;box-shadow:var(--shadow)}
  .btn.gold{background:linear-gradient(90deg,var(--gold),#ff9f1c);color:#241c00}
  .btn.ghost{background:var(--panel);border:1px solid var(--line);color:var(--ink);box-shadow:none}
  .btn.sm{padding:8px 12px;font-size:13px}
  .btn:disabled{opacity:.4;cursor:not-allowed}
  .qwrap{max-width:620px;margin:0 auto}
  .qcount{color:var(--muted);font-size:13px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center}
  .deckbadge{font-size:11px;padding:3px 9px;border-radius:999px;background:var(--panel2);color:var(--muted)}
  .qtext{font-size:22px;font-weight:700;line-height:1.4;margin:10px 0 16px}
  .qtext .gap{color:var(--gold)}
  .trans{color:var(--muted);font-size:15px;font-weight:500}
  .qhint{color:var(--muted);font-size:13px;margin-bottom:12px}
  .opt{display:block;width:100%;text-align:left;background:var(--panel);border:1.5px solid var(--line);color:var(--ink);
    padding:14px 16px;border-radius:12px;margin-bottom:10px;cursor:pointer;font-size:15px}
  .opt:hover{border-color:var(--blue)}
  .opt.correct{border-color:var(--green);background:#34c98b22}.opt.wrong{border-color:var(--red);background:#e4574c22}
  .three{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
  .three .opt{text-align:center;font-weight:700;font-size:18px;margin:0}
  .cases{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
  .cases .opt{width:auto;flex:1;text-align:center;margin:0;font-size:14px;padding:11px}
  input.fill{width:100%;padding:13px 15px;border-radius:12px;border:1.5px solid var(--line);background:var(--panel);
    color:var(--ink);font-size:16px;margin-bottom:10px}
  label.flbl{font-size:13px;color:var(--muted);display:block;margin-bottom:4px}
  .explain{margin-top:14px;padding:12px 14px;border-radius:12px;background:var(--panel2);font-size:14px;line-height:1.55;
    border-left:4px solid var(--blue)}
  .explain.good{border-color:var(--green)}.explain.bad{border-color:var(--red)}
  .explain .rule{display:block;margin-top:6px;color:var(--gold)}
  .rowbtns{display:flex;gap:10px;margin-top:16px;flex-wrap:wrap;align-items:center}
  .markbtn{margin-left:auto;background:transparent;border:1px solid var(--line);color:var(--muted);border-radius:10px;
    padding:9px 12px;cursor:pointer;font-size:14px}
  .markbtn.on{color:var(--gold);border-color:var(--gold)}
  .center{text-align:center}.big{font-size:46px;margin:8px 0}.muted{color:var(--muted)}
  a.link{color:var(--blue);cursor:pointer}
  .dash{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:16px}
  .stat{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:13px;text-align:center}
  .stat .n{font-size:26px;font-weight:800;color:var(--gold)}.stat .l{font-size:12px;color:var(--muted)}
  .ach,.markrow{display:flex;gap:12px;align-items:center;padding:12px;border:1px solid var(--line);border-radius:12px;
    background:var(--panel);margin-bottom:10px}
  .ach .ic{font-size:24px;width:40px;text-align:center}.ach.locked{opacity:.4}
  .toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%);background:var(--panel);border:1px solid var(--gold);
    padding:13px 20px;border-radius:14px;box-shadow:var(--shadow);font-weight:700;z-index:50;animation:pop .3s}
  @keyframes pop{from{transform:translate(-50%,20px);opacity:0}to{transform:translate(-50%,0);opacity:1}}
  @media(max-width:520px){.qtext{font-size:19px}.three .opt{font-size:16px}}
  .help-overlay{position:fixed;inset:0;background:rgba(8,9,20,.7);backdrop-filter:blur(3px);z-index:60;
    display:flex;align-items:center;justify-content:center;padding:16px}
  .help-box{background:var(--panel);border:1px solid var(--line);border-radius:16px;max-width:760px;width:100%;
    max-height:88vh;overflow:auto;padding:18px;box-shadow:var(--shadow)}
  .help-box h3{margin:0 0 10px}
  .help-box .closex{float:right;background:var(--panel2);border:1px solid var(--line);color:var(--ink);
    border-radius:10px;padding:6px 12px;cursor:pointer}
  table.decl{border-collapse:collapse;width:100%;font-size:13.5px;margin:8px 0}
  table.decl th,table.decl td{border:1px solid var(--line);padding:8px 10px;text-align:left}
  table.decl th{background:var(--panel2);color:var(--ink)}
  table.decl td:first-child{font-weight:700;color:var(--gold)}
  table.decl .nom{background:#e457741a}.akk{background:#ffce3a14}.dat{background:#34c98b14}.gen{background:#a06bff1a}
  .help-box p{font-size:14px;line-height:1.6;color:var(--ink)}
  .help-box .muted{color:var(--muted)}

function buildItems(){
  const it=[];
  GENDERS.forEach((d,i)=>it.push({id:"g"+i,deck:"gen",type:"gen",g:d[0],w:d[1],t:d[2],r:d[3]}));
  PREPS.forEach((d,i)=>it.push({id:"p"+i,deck:"prep",type:"prep",s:d[0],acc:d[1],c:d[2],e:d[3]}));
  VERBS.forEach((d,i)=>it.push({id:"v"+i,deck:"verb",type:"verb",inf:d[0],m:d[1],pra:d[2],par:d[3],aux:d[4],ex:d[5]}));
  PLURALS.forEach((d,i)=>it.push({id:"pl"+i,deck:"plural",type:"plural",art:d[0],w:d[1],pl:d[2],r:d[3]}));
  GENITIVE.forEach((d,i)=>it.push({id:"ge"+i,deck:"genitiv",type:"genitiv",base:d[0],gen:d[1],r:d[2]}));
  ADJDECL.forEach((d,i)=>it.push({id:"a"+i,deck:"adj",type:"adj",s:d[0],acc:d[1],e:d[2]}));
  GRAMMAR.forEach((d,i)=>{
    if(d[0]==="mc") it.push({id:"q"+i,deck:"gram",type:"mc",q:d[1],o:d[2],a:d[3],e:d[4]});
    else if(d[0]==="fill") it.push({id:"q"+i,deck:"gram",type:"fill",q:d[1],acc:d[2],e:d[3]});
    else it.push({id:"q"+i,deck:"gram",type:"trans",es:d[1],de:d[2],e:d[3]});
  });
  return it;
}

/* ===================== ESTADO ===================== */
const KEY="deutschQuest_v2";
const todayStr=()=>new Date().toISOString().slice(0,10);
let S=load();
function load(){try{const d=JSON.parse(localStorage.getItem(KEY));if(d)return d;}catch(e){}
  return {xp:0,streak:0,lastDay:null,stats:{},marks:{},ach:{},counts:{gen:0,prep:0,verb:0,gram:0}};}
function save(){localStorage.setItem(KEY,JSON.stringify(S));}
function levelFor(xp){return Math.floor(Math.sqrt(xp/40))+1;}
function xpForLevel(l){return 40*Math.pow(l-1,2);}
function checkDay(){const t=todayStr();if(S.lastDay===t)return;
  if(S.lastDay){const diff=(new Date(t)-new Date(S.lastDay))/86400000;S.streak=diff===1?S.streak+1:1;}else S.streak=1;
  S.lastDay=t;save();}
function st(id){return S.stats[id]||(S.stats[id]={seen:0,right:0,wrong:0,streak:0});}
function record(id,ok){const s=st(id);s.seen++;if(ok){s.right++;s.streak++;}else{s.wrong++;s.streak=0;}save();}
/* un ítem es "fallo pendiente" si lo has fallado y no lo has acertado 2 veces seguidas desde entonces */
function isFail(id){const s=S.stats[id];return !!s&&!s.ignored&&s.wrong>0&&s.streak<2;}
function failList(){return ITEMS.filter(x=>isFail(x.id));}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

/* ===================== XP / LOGROS ===================== */
function addXp(n){const b=levelFor(S.xp);S.xp+=n;const a=levelFor(S.xp);
  if(a>b)toast("⭐ ¡Nivel "+a+"!");unlock();save();renderHeader();}
function deckCorrect(deck){let c=0;for(const x of ITEMS)if(x.deck===deck&&S.stats[x.id])c+=S.stats[x.id].right>0?1:0;return c;}
function unlock(){
  const test={
   first:Object.keys(S.stats).length>0,
   xp200:S.xp>=200,xp1000:S.xp>=1000,
   streak7:S.streak>=7,
   gen50:deckCorrect("gen")>=50,
   fails0:Object.keys(S.stats).length>0&&failList().length===0,
   verb30:deckCorrect("verb")>=30,
   mark10:Object.keys(S.marks).length>=10,
   level8:levelFor(S.xp)>=8,
   prep40:deckCorrect("prep")>=40
  };
  for(const a of ACHIEVEMENTS) if(test[a.id]&&!S.ach[a.id]){S.ach[a.id]=todayStr();setTimeout(()=>toast("🏆 "+a.name),300);}
}

    const total=k==="all"?ITEMS.length:ITEMS.filter(x=>x.deck===k).length;

      <div class="meta"><span>${done}/${total} dominados</span><span>▶️</span></div></div>`;
  }).join("")+`</div>`;
}

/* ---- SESIÓN ---- */
let Q=null;
function isMarked(id){return !!S.marks[id];}
function pickQueue(deck,n){
  const inDeck=x=>(deck==="all"||x.deck===deck)&&!(S.stats[x.id]&&S.stats[x.id].ignored);
  // pool de repaso = fallos pendientes + cosas marcadas (sin duplicar)
  const review=shuffle(ITEMS.filter(x=>inDeck(x)&&(isFail(x.id)||isMarked(x.id))));
  const reviewIds=new Set(review.map(x=>x.id));
  const fresh=ITEMS.filter(x=>inDeck(x)&&!reviewIds.has(x.id))
    .sort((a,b)=>weight(b)-weight(a)+(Math.random()-.5)*0.5);
  // como mucho ~1/3 de la ronda son fallos/marcadas; el resto, material nuevo/poco visto
  const maxRev=Math.min(review.length,Math.max(2,Math.round(n/3)));
  const chosen=review.slice(0,maxRev).concat(fresh.slice(0,n-maxRev));
  return shuffle(chosen).slice(0,n);
}
function weight(x){const s=S.stats[x.id];if(!s)return 2;return 1-Math.min(s.right,3)*0.2;}
function start(deck){Q={deck,queue:pickQueue(deck,12),i:0,correct:0};checkDay();renderHeader();showQ();}
function startFails(){const f=shuffle(failList());if(!f.length){renderFails();return;}
  Q={deck:"fails",queue:f.slice(0,12),i:0,correct:0};checkDay();showQ();}
function startMarks(){const m=shuffle(ITEMS.filter(x=>isMarked(x.id)));if(!m.length){renderMarks();return;}
  Q={deck:"marks",queue:m.slice(0,12),i:0,correct:0};checkDay();showQ();}
window.startMarks=startMarks;

function showQ(){
  if(Q.i>=Q.queue.length)return finish();
  const it=Q.queue[Q.i],n=Q.i+1,total=Q.queue.length;
  const deckName=DECKS[it.deck]?DECKS[it.deck].name:it.deck;
  let body="";
  if(it.type==="gen"){
    body=`<div class="qhint">¿der, die o das?</div>
      <div class="qtext">___ ${esc(it.w)} <span class="trans">(${esc(it.t)})</span></div>
      <div class="three">
        <button class="opt" onclick="ansGen('der')">der</button>
        <button class="opt" onclick="ansGen('die')">die</button>
        <button class="opt" onclick="ansGen('das')">das</button></div>`;
  } else if(it.type==="prep"){
    body=`<div class="qhint">Escribe la preposición y elige el caso</div>
      <div class="qtext">${esc(it.s).replace("___",'<span class="gap">_____</span>')}</div>
      <input class="fill" id="pIn" autocomplete="off" placeholder="preposición…">
      <label class="flbl">¿Qué caso rige?</label>
      <div class="cases">
        <button class="opt" data-c="Akk" onclick="pickCase(this)">Akkusativo</button>
        <button class="opt" data-c="Dat" onclick="pickCase(this)">Dativo</button>
        <button class="opt" data-c="Gen" onclick="pickCase(this)">Genitivo</button></div>
      <div class="rowbtns"><button class="btn" onclick="ansPrep()">Comprobar</button></div>`;
  } else if(it.type==="verb"){
    body=`<div class="qhint">Conjuga el verbo irregular</div>
      <div class="qtext">${esc(it.inf)} <span class="trans">(${esc(it.m)})</span></div>
      <label class="flbl">Präteritum (3ª pers. sing., «er ___»)</label>
      <input class="fill" id="vP" autocomplete="off" placeholder="z.B. ging">
      <label class="flbl">Partizip Perfekt (sin auxiliar)</label>
      <input class="fill" id="vT" autocomplete="off" placeholder="z.B. gegangen">
      <div class="rowbtns"><button class="btn" onclick="ansVerb()">Comprobar</button></div>`;
  } else if(it.type==="plural"){
    body=`<div class="qhint">Escribe el plural</div>
      <div class="qtext">${esc(it.art)} ${esc(it.w)} <span class="trans">→ die …?</span></div>
      <input class="fill" id="plIn" autocomplete="off" placeholder="z.B. Äpfel" onkeydown="if(event.key==='Enter')ansPlural()">
      <div class="rowbtns"><button class="btn" onclick="ansPlural()">Comprobar</button></div>`;
  } else if(it.type==="genitiv"){
    body=`<div class="qhint">Pon el caso Genitivo (artículo + nombre)</div>
      <div class="qtext">${esc(it.base)} <span class="trans">→ Genitiv?</span></div>
      <input class="fill" id="geIn" autocomplete="off" placeholder="z.B. des Mannes" onkeydown="if(event.key==='Enter')ansGenitiv()">
      <div class="rowbtns"><button class="btn" onclick="ansGenitiv()">Comprobar</button>
        <button class="btn ghost sm" onclick="showHelp('weak')">ℹ️ ¿Masc. débil?</button></div>`;
  } else if(it.type==="adj"){
    body=`<div class="qhint">Escribe la terminación del adjetivo</div>
      <div class="qtext">${esc(it.s).replace("___",'<span class="gap">-?</span>')}</div>
      <input class="fill" id="aIn" autocomplete="off" placeholder="z.B. en" onkeydown="if(event.key==='Enter')ansAdj()">
      <div class="rowbtns"><button class="btn" onclick="ansAdj()">Comprobar</button>
        <button class="btn ghost sm" onclick="showHelp('adj')">📋 Ver tabla</button></div>`;
  } else if(it.type==="mc"){
    body=`<div class="qtext">${esc(it.q)}</div>`+it.o.map((o,i)=>`<button class="opt" onclick="ansMC(${i})">${esc(o)}</button>`).join("");
  } else if(it.type==="fill"){
    body=`<div class="qtext">${esc(it.q)}</div>
      <input class="fill" id="fIn" autocomplete="off" placeholder="Tu respuesta…" onkeydown="if(event.key==='Enter')ansFill()">
      <div class="rowbtns"><button class="btn" onclick="ansFill()">Comprobar</button></div>`;
  } else if(it.type==="trans"){
    body=`<div class="qhint">🌍 Traduce al alemán</div><div class="qtext">${esc(it.es)}</div>
      <button class="btn ghost" onclick="revealTrans()">Mostrar respuesta</button><div id="tr"></div>`;
  }
  app.innerHTML=`<div class="qwrap">
    <div class="qcount"><span>${n}/${total}</span><span class="deckbadge">${esc(deckName)}</span></div>
    <div class="bar" style="margin-bottom:16px"><i style="width:${(n-1)/total*100}%"></i></div>
    ${body}<div id="exp"></div></div>`;
  setTimeout(()=>{(document.getElementById("pIn")||document.getElementById("vP")||document.getElementById("fIn")||document.getElementById("plIn")||document.getElementById("geIn")||document.getElementById("aIn"))?.focus();},40);
}
let caseSel=null;
window.pickCase=(b)=>{caseSel=b.dataset.c;document.querySelectorAll(".cases .opt").forEach(o=>o.style.borderColor="var(--line)");b.style.borderColor="var(--gold)";};

function feedback(ok,html){
  const it=Q.queue[Q.i];record(it.id,ok);if(ok)Q.correct++;
  const marked=!!S.marks[it.id];
  document.getElementById("exp").innerHTML=
    `<div class="explain ${ok?"good":"bad"}">${ok?"✅ Richtig!":"❌ Fast!"} ${html}</div>
     <div class="rowbtns">
       <button class="btn" onclick="next()">Siguiente →</button>
       <button class="markbtn ${marked?"on":""}" id="mk" onclick="toggleMark()">📌 ${marked?"Marcado":"Marcar"}</button>
     </div>`;
  addXp(ok?xpFor(it):2);
}
function xpFor(it){return it.type==="prep"||it.type==="verb"?9:it.type==="trans"?8:(it.type==="plural"||it.type==="genitiv"||it.type==="adj")?7:5;}
window.ansGen=(ch)=>{const it=Q.queue[Q.i];const ok=ch===it.g;
  document.querySelectorAll(".three .opt").forEach(o=>{o.onclick=null;if(o.textContent===it.g)o.classList.add("correct");if(o.textContent===ch&&!ok)o.classList.add("wrong");});
  feedback(ok,`Es <b>${it.g} ${esc(it.w)}</b>.<span class="rule">📘 ${esc(it.r)}</span>`);};
window.ansPrep=()=>{const it=Q.queue[Q.i];const v=norm(document.getElementById("pIn").value);
  const okP=it.acc.some(a=>norm(a)===v|| (a==="—"&&(v===""||v==="-")) );const okC=caseSel===it.c;const ok=okP&&okC;
  const caseName={Akk:"Acusativo",Dat:"Dativo",Gen:"Genitivo"}[it.c];
  feedback(ok,`Preposición: <b>${esc(it.acc[0])}</b> · Caso: <b>${caseName}</b>.
    <span class="rule">📘 ${esc(it.e)}</span>${ok?"":`<br><span class="muted">${okP?"":"❗ Preposición"} ${okC?"":"❗ Caso"}</span>`}`);
  caseSel=null;};
window.ansVerb=()=>{const it=Q.queue[Q.i];const p=norm(document.getElementById("vP").value),t=norm(document.getElementById("vT").value);
  const okP=p===norm(it.pra),okT=t===norm(it.par);const ok=okP&&okT;
  feedback(ok,`<b>${esc(it.inf)} – ${esc(it.pra)} – ${esc(it.aux)} ${esc(it.par)}</b>.
    <span class="rule">📝 ${esc(it.ex)}</span>${ok?"":`<br><span class="muted">${okP?"":"❗ Präteritum"} ${okT?"":"❗ Partizip"}</span>`}`);};
window.ansPlural=()=>{const it=Q.queue[Q.i];const v=norm(document.getElementById("plIn").value);
  const ok=v===norm(it.pl)||v===norm("die "+it.pl);document.getElementById("plIn").disabled=true;
  feedback(ok,`Plural: <b>die ${esc(it.pl)}</b>.<span class="rule">📘 ${esc(it.r)}</span>`);};
window.ansGenitiv=()=>{const it=Q.queue[Q.i];const v=norm(document.getElementById("geIn").value);
  const bare=norm(it.gen).replace(/^des /,"").replace(/^der /,"");
  const ok=v===norm(it.gen)||v===bare;document.getElementById("geIn").disabled=true;
  feedback(ok,`Genitiv: <b>${esc(it.gen)}</b>.<span class="rule">📘 ${esc(it.r)}</span>`);};
window.ansAdj=()=>{const it=Q.queue[Q.i];let v=norm(document.getElementById("aIn").value).replace(/^-/,"");
  const ok=it.acc.some(a=>norm(a)===v);document.getElementById("aIn").disabled=true;
  const sol=esc(it.s).replace("___",'<b>-'+esc(it.acc[0])+'</b>');
  feedback(ok,`${sol}<span class="rule">📘 ${esc(it.e)}</span>`);};
window.ansMC=(i)=>{const it=Q.queue[Q.i];const ok=i===it.a;
  document.querySelectorAll(".opt").forEach((o,k)=>{o.onclick=null;if(k===it.a)o.classList.add("correct");if(k===i&&!ok)o.classList.add("wrong");});
  feedback(ok,`<span class="rule">📘 ${esc(it.e)}</span>`);};
window.ansFill=()=>{const it=Q.queue[Q.i];const v=norm(document.getElementById("fIn").value);
  const accepts=Array.isArray(it.acc)?it.acc:[it.acc];const ok=accepts.some(a=>v===norm(a));
  document.getElementById("fIn").disabled=true;
  feedback(ok,`Respuesta: <b>${esc(accepts[0])}</b>.<span class="rule">📘 ${esc(it.e)}</span>`);};
window.revealTrans=()=>{const it=Q.queue[Q.i];
  document.getElementById("tr").innerHTML=`<div class="explain good" style="margin-top:14px"><b>${esc(it.de)}</b>
    <span class="rule">📘 ${esc(it.e)}</span></div>
    <div class="qhint" style="margin-top:12px">¿Lo acertaste?</div>
    <div class="rowbtns"><button class="btn gold" onclick="selfTrans(true)">✅ Sí</button>
      <button class="btn ghost" onclick="selfTrans(false)">❌ No</button></div>`;};
window.selfTrans=(ok)=>{const it=Q.queue[Q.i];record(it.id,ok);if(ok){Q.correct++;addXp(8);}else addXp(2);next();};
window.toggleMark=()=>{const it=Q.queue[Q.i];if(S.marks[it.id])delete S.marks[it.id];else S.marks[it.id]=markText(it);
  unlock();save();const b=document.getElementById("mk");const on=!!S.marks[it.id];b.classList.toggle("on",on);b.innerHTML="📌 "+(on?"Marcado":"Marcar");};
function markText(it){
  if(it.type==="gen")return {h:`${it.g} ${it.w}`,d:`${it.t} — ${it.r}`};
  if(it.type==="prep")return {h:it.s.replace("___","["+it.acc[0]+"]"),d:it.e};
  if(it.type==="verb")return {h:`${it.inf} – ${it.pra} – ${it.aux} ${it.par}`,d:`${it.m}. ${it.ex}`};
  if(it.type==="plural")return {h:`${it.art} ${it.w} → die ${it.pl}`,d:it.r};
  if(it.type==="genitiv")return {h:`${it.base} → ${it.gen}`,d:it.r};
  if(it.type==="adj")return {h:it.s.replace("___","-"+it.acc[0]),d:it.e};
  if(it.type==="trans")return {h:it.de,d:it.es+" — "+it.e};
  if(it.type==="mc")return {h:it.q,d:it.o[it.a]+" — "+it.e};
  return {h:it.q,d:(Array.isArray(it.acc)?it.acc[0]:it.acc)+" — "+it.e};
}
window.next=()=>{Q.i++;showQ();};
function finish(){const score=Math.round(Q.correct/Q.queue.length*100);
  app.innerHTML=`<div class="qwrap center card">
    <div class="big">${score===100?"🎉":score>=60?"👏":"💪"}</div>
    <h2>Ronda terminada</h2><div class="big" style="color:var(--gold)">${score}%</div>
    <p>${Q.correct}/${Q.queue.length} aciertos</p>
    <p class="muted">Fallos pendientes ahora: ${failList().length}</p>
    <div class="rowbtns" style="justify-content:center">
      <button class="btn" onclick="renderPlay()">Otra ronda</button>
      <button class="btn gold" onclick="startFails()" ${failList().length?"":"disabled"}>Repasar fallos</button></div></div>`;
}

/* ---- MIS FALLOS ---- */
function renderFails(){const f=failList();
  app.innerHTML=`<h2>🩹 Mis fallos (${f.length})</h2>
   <div class="card"><p class="muted" style="margin:0 0 12px">Aquí están los ítems que has fallado. Salen en este modo
   hasta que los aciertes <b>dos veces seguidas</b>; entonces se consideran aprendidos y desaparecen.</p>
   <button class="btn" ${f.length?"":"disabled"} onclick="startFails()">${f.length?"Repasar mis fallos":"¡Nada que repasar! ✅"}</button></div>`+
   (f.length?`<div style="margin-top:14px">`+f.map(it=>{const s=S.stats[it.id];const m=markText(it);
     return `<div class="markrow"><div><b>${esc(m.h)}</b><br><small class="muted">${esc(m.d)}</small></div>
       <div style="margin-left:auto;text-align:right;display:flex;align-items:center;gap:10px">
         <small class="muted">✅${s.right} ❌${s.wrong}<br>racha ${s.streak}/2</small>
         <button class="btn ghost sm" title="No volver a preguntar" onclick="forgetFail('${it.id}')">✔️ Ya lo sé</button>
       </div></div>`;}).join("")+`</div>`:"");
}
window.forgetFail=(id)=>{const s=st(id);s.ignored=true;save();unlock();renderFails();toast("Quitado de tus fallos");};

/* ---- MIS COSAS ---- */
function renderMarks(){const ks=Object.keys(S.marks);
  app.innerHTML=`<h2>📌 Mis cosas (${ks.length})</h2>`+
   (ks.length?`<div class="card" style="margin-bottom:14px"><p class="muted" style="margin:0 0 10px">
     Lo que marcas también te lo voy preguntando en las rondas normales, hasta que lo quites de aquí.</p>
     <button class="btn gold" onclick="startMarks()">🎯 Repasar solo las marcadas</button></div>`:"")+
   (ks.length?ks.map(id=>{const m=S.marks[id];return `<div class="markrow">
     <div><b>${esc(m.h)}</b><br><small class="muted">${esc(m.d)}</small></div>
     <button class="btn ghost sm" style="margin-left:auto" onclick="unmark('${id}')">Quitar</button></div>`;}).join("")
   :`<div class="card"><p class="muted" style="margin:0">Aún no has marcado nada. Durante los ejercicios, pulsa <b>📌 Marcar</b> en lo que quieras recordar.</p></div>`);
}
window.unmark=(id)=>{delete S.marks[id];save();renderMarks();};

/* ---- LOGROS ---- */
function renderAch(){unlock();
  app.innerHTML=`<h2>🏆 Logros (${Object.keys(S.ach).length}/${ACHIEVEMENTS.length})</h2>`+
   ACHIEVEMENTS.map(a=>{const g=S.ach[a.id];return `<div class="ach ${g?"":"locked"}"><div class="ic">${a.ic}</div>
     <div><b>${a.name}</b><br><small class="muted">${a.desc}${g?" · "+g:""}</small></div>
     <div style="margin-left:auto">${g?"✅":"🔒"}</div></div>`;}).join("");
}

/* ---- PROGRESO ---- */
function renderData(){
  app.innerHTML=`<h2>⚙️ Tu progreso</h2>
   <div class="card"><p class="muted">Se guarda solo en este navegador. Expórtalo para respaldarlo o pasarlo a otro dispositivo.</p>
   <div class="rowbtns">
     <button class="btn gold" onclick="exportData()">⬇️ Exportar</button>
     <label class="btn ghost" style="cursor:pointer">⬆️ Importar<input type="file" accept="application/json" style="display:none" onchange="importData(event)"></label>
     <button class="btn ghost" onclick="resetData()">🗑️ Reiniciar</button></div></div>
   <div class="card" style="margin-top:14px"><h3 style="margin:0 0 6px">Resumen</h3>
   <p class="muted" style="margin:0">XP <b>${S.xp}</b> · Nivel <b>${levelFor(S.xp)}</b> · Racha <b>${S.streak}</b> días<br>
   Géneros <b>${deckCorrect("gen")}/${GENDERS.length}</b> · Plurales <b>${deckCorrect("plural")}/${PLURALS.length}</b> ·
   Genitivo <b>${deckCorrect("genitiv")}/${GENITIVE.length}</b> · Adjetivos <b>${deckCorrect("adj")}/${ADJDECL.length}</b> · Preposiciones <b>${deckCorrect("prep")}/${PREPS.length}</b> ·
   Verbos <b>${deckCorrect("verb")}/${VERBS.length}</b> · Gramática <b>${deckCorrect("gram")}/${GRAMMAR.length}</b><br>
   Fallos pendientes <b>${failList().length}</b> · Cosas marcadas <b>${Object.keys(S.marks).length}</b> · Logros <b>${Object.keys(S.ach).length}</b></p></div>`;
}
window.exportData=()=>{const b=new Blob([JSON.stringify(S,null,2)],{type:"application/json"});
  const a=document.createElement("a");a.href=URL.createObjectURL(b);a.download="deutschquest-progreso.json";a.click();};
window.importData=(ev)=>{const f=ev.target.files[0];if(!f)return;const r=new FileReader();
  r.onload=()=>{try{S=JSON.parse(r.result);save();renderHeader();toast("✅ Importado");renderData();}catch(e){toast("❌ Archivo no válido");}};r.readAsText(f);};
window.resetData=()=>{if(confirm("¿Borrar todo tu progreso?")){localStorage.removeItem(KEY);S=load();renderHeader();renderData();toast("Reiniciado");}};

/* ---- AYUDA (tabla de adjetivos / masc. débil) ---- */
const HELP={
 adj:`<button class="closex" onclick="closeHelp()">✕</button>
   <h3>🧩 Declinación del artículo + adjetivo</h3>
   <p class="muted">El adjetivo <b>atributivo</b> (delante del sustantivo) se declina; el <b>predicativo</b> (tras el verbo) no:
   <i>Das billige Auto ist rot.</i></p>
   <table class="decl">
     <tr><th>Caso</th><th>Masc.</th><th>Fem.</th><th>Neutro</th><th>Plural</th></tr>
     <tr class="nom"><td>NOM</td><td>der / ein <b>-er</b></td><td>die / eine <b>-e</b></td><td>das / ein <b>-es</b></td><td>die <b>-en</b></td></tr>
     <tr class="akk"><td>AKK</td><td>den / einen <b>-en</b></td><td>die / eine <b>-e</b></td><td>das / ein <b>-es</b></td><td>die <b>-en</b></td></tr>
     <tr class="dat"><td>DAT</td><td>dem / einem <b>-en</b></td><td>der / einer <b>-en</b></td><td>dem / einem <b>-en</b></td><td>den <b>-en</b> (+ -n)</td></tr>
     <tr class="gen"><td>GEN</td><td>des / eines <b>-en</b></td><td>der / einer <b>-en</b></td><td>des / eines <b>-en</b></td><td>der <b>-en</b></td></tr>
   </table>
   <p class="muted">Cuando <b>ein</b> no lleva terminación, el adjetivo asume el marcador del género: <b>-er</b> (masc. NOM)
   y <b>-es</b> (neutro NOM/AKK). Recuerda: <b>Dativo y Genitivo → siempre -en</b>; el plural con artículo → siempre -en.</p>`,
 weak:`<button class="closex" onclick="closeHelp()">✕</button>
   <h3>📜 ¿Qué es un masculino "débil" (n-Deklination)?</h3>
   <p>Es un grupo de sustantivos <b>masculinos</b> que añaden <b>-n / -en</b> en <b>todos los casos excepto el nominativo singular</b>
   (no solo en el genitivo). Por eso "del estudiante" es <i>des Studenten</i> y no "des Students".</p>
   <p class="muted">Suelen ser: seres animados acabados en <b>-e</b> (der Junge, der Kollege, der Affe, der Kunde) y palabras en
   <b>-ent, -ant, -ist, -at</b> referidas a personas (der Student, der Präsident, der Polizist).</p>
   <table class="decl">
     <tr><th>Caso</th><th>der Student</th><th>der Junge</th></tr>
     <tr class="nom"><td>NOM</td><td>der Student</td><td>der Junge</td></tr>
     <tr class="akk"><td>AKK</td><td>den Student<b>en</b></td><td>den Jung<b>en</b></td></tr>
     <tr class="dat"><td>DAT</td><td>dem Student<b>en</b></td><td>dem Jung<b>en</b></td></tr>
     <tr class="gen"><td>GEN</td><td>des Student<b>en</b></td><td>des Jung<b>en</b></td></tr>
   </table>
   <p class="muted">Casos especiales: <i>der Name → des Namens</i>, <i>das Herz → des Herzens</i> (añaden -ns/-ens).</p>`
};
window.showHelp=(k)=>{const h=document.getElementById("help");h.innerHTML='<div class="help-box">'+HELP[k]+'</div>';h.style.display="flex";};
window.closeHelp=()=>{document.getElementById("help").style.display="none";};

/* ---- INIT ---- */
checkDay();renderHeader();renderHome();
</script>
